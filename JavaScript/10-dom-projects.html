<!DOCTYPE html>
<html>
  <head>
    <title>DOM Projects</title>
		<style>
			body {
				font-family: Arial;
			}

			.subscribe-button {
				border: none;
				background-color: black;
				color: white;
				padding-top:10px;
				padding-bottom:10px;
				cursor: pointer;
				border-radius: 50px;
				padding-left: 10px;
				padding-right: 10px;
				font-weight: bold;
				margin-bottom: 30px
			}

			.is-subscribed {
				background-color: rgb(240, 240, 240);
				color: black;
			}

			.cost-input {
				padding: 10px;
				border-radius: 2.5px;
				border: 1px solid rgb(200, 200, 200);
				margin-right: 10px;
			}

			.calc-button {
				border: none;
				background-color: green;
				color: white;
				padding: 10px 15px;
				cursor: pointer;
				border-radius: 5px;
				cursor: pointer
			}

		</style>
  </head>
  <body>
		<p>YouTube Subscribe Button</p>
		<button onclick="
			subscribe();
		" class="js-subscribe-button subscribe-button">
			Subscribe
		</button>

		<p>Amazon Shipping Calculator</p>
		<input placeholder="Cost of order"
		class ='js-cost-input cost-input' onkeydown="handleCostKeydown(event)">
		<button onclick="
			calculateTotal();
		" class="calc-button">Calculate</button>
		<p class="js-total-cost"></p>

    <script> 
			window.console.log
			
			function handleCostKeydown(event) {
				if (event.key === 'Enter') {
					calculateTotal();
				}
			}

			function calculateTotal() {
				const inputElement = document.querySelector('.js-cost-input');
				let cost = Number(inputElement.value);

				if (cost < 40) {
					cost = cost + 10;
				} 

				document.querySelector('.js-total-cost').innerText = `Total Cost: $${cost}`;
			}

			function subscribe() {
				const buttonElement = document.querySelector('.js-subscribe-button');
				if (buttonElement.innerText === 'Subscribe') {
					buttonElement.innerText = 'Subscribed';
					buttonElement.classList.add('is-subscribed');
				} else {
					buttonElement.innerText = 'Subscribe';
					buttonElement.style.backgroundColor = '';
					buttonElement.classList.remove('is-subscribed');
				}
			}
    </script>
  </body>
</html>
