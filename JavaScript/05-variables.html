<!DOCTYPE html>
<html>
    <head>
        <title>Variables</title>
            
    </head>
    <body>
        <script> 
            // we cannot use let as a variable name, 
            // we also cannot use it as a function name
            let variable1 = 3;
            console.log(variable1);
            
            let calculation = 2 + 2;
            console.log(calculation);
            console.log(variable1 + calculation);

            let result = calculation + 2;
            console.log(result);

            let message = "Hello, world!";
            console.log(message); console.log(";");

            variable1 = 5;
            console.log(variable1);

            const variable2 = 3; // This is a constant variable it cant be changed
            var variable3 = 5; 

            console.log(typeof variable3);
            /* This is a variable declared with var, similar to let BUT
               it is function-scoped, meaning it is accessible within the function
               it is declared in, even before the line where it is declared.

               IN SHORT: ITS NOT RECOMMENDED IN NEW JAVASCRIPT CODE SO JUST USE LET
            */

        </script>
    </body>
</html>
