<!DOCTYPE html>
<html>
  <head>
    <title>Rock Paper Scissors</title>
  </head>
  <body>
    <p>Rock Paper Scissors</p>
    <button onclick="
      playGame('Rock');
    ">Rock</button>

    <button onclick="
      playGame('Paper');
    ">Paper</button>
    
    <button onclick="
      playGame('Scissors');
    ">Scissors</button>

    <script> 
      function playGame(playerMove) {
        const computerMove = pickComputerMove();

        let result = '';

        if (playerMove === 'Rock') {
          if (computerMove === 'Rock') {
            result = 'It\'s a tie!';
          } else if (computerMove === 'Paper') {
            result = 'You lose!';
          } else {
            result = 'You win!';
          }

        } else if (playerMove === 'Paper') {
          if (computerMove === 'Rock') {
            result = 'You win!';
          } else if (computerMove === 'Paper') {
            result = 'It\'s a tie!';
          } else {
            result = 'You lose!';
          }
          
        } else {
          if (computerMove === 'Scissors') {
            result = 'You lose!';
          } else if (computerMove === 'Paper') {
            result = 'You win!';
          } else {
          result = 'It\'s a tie!';
          }
        }
        alert(`you clicked ${playerMove}, computerMove: ${computerMove}, result: ${result}`);
      }

      function pickComputerMove() {
        const randomNumber = Math.random();

        let computerMove = '';
        if (randomNumber < 1/3 && randomNumber > 0) {
          computerMove = 'Rock';
        } else if (randomNumber < 2/3 && randomNumber >= 1/3) {
          computerMove = 'Paper';
        } else {
          computerMove = 'Scissors';
        }

        return computerMove;
      }

      function pickComputerMove() {
        const randomNumber = Math.random();

        let computerMove = '';

        if (randomNumber < 1/3 && randomNumber > 0) {
          computerMove = 'Rock';
        } else if (randomNumber < 2/3 && randomNumber >= 1/3) {
          computerMove = 'Paper';
        } else {
          computerMove = 'Scissors';
        }

        return computerMove;
      }
    </script>
  </body>
</html>
