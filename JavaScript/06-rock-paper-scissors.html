        computerMove = 'Paper';

        computerMove = 'Scissors';
      }

        result = 'It\'s a tie!';

        result = 'You lose!';
      } else {
        result = 'You win!';
      }

      alert(`you clicked Rock, computerMove: ${computerMove}, result: ${result}`);
