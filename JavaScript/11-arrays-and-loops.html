<!DOCTYPE html>
<html>
  <head>
    <title>Arrays and Loops</title>
  </head>
  <body>
    <script>
			const myArray = [
				10, 
				20, 
				30
			];
			console.log(myArray);
			console.log(myArray[0]);

			myArray[0] = 99;
			console.log(myArray[0]);

			[1, 'hello', true, { name: 'socks'}, [1,2]]

			console.log(typeof [1, 2]) // Object
			console.log(myArray.length)

			myArray.push(100); // 100 add at end of array

			myArray.splice(0, 2) // Explain: remove 2 values from loc 0

			let i = 1
			while (i <= 3) {
				console.log(i);
				i ++
			}

			for (let i = 1; i <= 5; i ++) {
				console.log(i)
			}

			// If standard loop, use for, if non-standard use while
			// E.g. of non-standard loop
			let randomNumber = 0
			while (randomNumber < 0.5) {
				randomNumber = Math.random();
			}

			console.log(randomNumber);

			const todoList = [
				'make dinner',
				'wash dishes',
				'watch youtube'
			]

			for (let index = 0; index < todoList.length; index ++) {
				const value = todoList[index];
				console.log(value);
			}

			const nums = [1, 1, 3]
			let total = 0
			for (let i = 0; i < nums.length; i ++) {
				total += nums[i];
			}
			console.log(total);

			const numsDoubled = [];

			for (let i = 0; i < nums.length; i ++) {
				const num = nums[i];
				numsDoubled.push(nums * 2);
			}

			console.log(numsDoubled)

			const array1 = [1,2,3]
			const array2 = array1.slice() // slice return a copy
			array2.push(4)
			console.log(array1)
			console.log(array2);

			const [firstValue, secondValue] = [1,2,3] // getting the first 2 in array

			for (let i = 1; i <= 10; i++) {
				if (i % 3 === 3) {
					continue // number divisible by 3 will be skipped
				}
				console.log(i);
				if (i === 8) {
					break; // stop a loop early
				}
			}

			while (i <= 10) {
				if (i % 3 === 0) {
					i++
					continue; // this is not okay because ++ skipped so must put i++ also in the if statement
				}
				console.log(i)
				i++
			}

			function doubleArray(nums) {
				const numsDobled = []
				
				for (let i = 0; i < nums.length; i++) {
					const num = nums[i]
					numsDoubled.push(nums * 2)
				}
				console.log(numsDoubled)
			}

			doubleArray([1,2,1])
    </script>
  </body>
</html>
