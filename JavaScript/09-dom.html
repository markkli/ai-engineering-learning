<!DOCTYPE html>
<html>
  <head>
    <title>DOM</title>
  </head>
  <body>
    <button>hello</button>
		<button class="js-button">second button</button>

    <script> 
			console.log(document.querySelector('button').innerHTML)

			document.querySelector('button')
				.innerHTML = 'Changed'; // This will change the button text to "Changed"

			const buttonElement = document.querySelector('.js-button');
			console.log(buttonElement);

			console.log(document.title) // DOM is a global object, so we can access it directly
			document.title = 'Changed';

			console.log(document.body);
			console.log(typeof document.body);

			// console.log(document.body.innerHTML);

			// document.body.innerHTML = '<button>Good job!</button>'; // This will replace the entire body content

			// Document Object Model (DOM)
			/* It represents the structure of a web page
			document.body.innerHTML = 'hello';
			document.title = 'Good job!';
			*/
    </script>
  </body>
</html>
